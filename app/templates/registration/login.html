{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="container mt-5">
 <div class="row justify-content-center">
  <div class="col-md-6">
   <div class="card">
    <div class="card-body">
     <h5 class="card-title text-center mb-4">Login</h5>
     <form method="post">
      {% csrf_token %}
      <div class="mb-3">
       <label for="username" class="form-label">Usuário</label>
       <input
        type="text"
        class="form-control"
        id="username"
        name="username"
        required
       />
      </div>
      <div class="mb-3">
       <label for="password" class="form-label">Senha</label>
       <input
        type="password"
        class="form-control"
        name="password"
        id="password"
        required
       />
      </div>
      <div class="d-grid gap-2">
       <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
     </form>
     {% if form.errors %}
      <div class="alert alert-danger mt-4">
       <ul class="mb-0">
        {% for field in form %}
         {% for error in field.erros %}
          <li>{{ error }}</li>
         {% endfor %}
        {% endfor %}
       </ul>
      </div>
     {% endif %}
    </div>
   </div>
  </div>
 </div>
</div>

{% endblock %}
